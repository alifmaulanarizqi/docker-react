name: CI/CD Pipeline (Self-Hosted)

on:
  push:
    branches:
      - dev
      - staging
      - master

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Run Tests (Without Dockerfile)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app node:18-alpine sh -c "npm install && CI=true npm test"

  deploy-dev:
    name: Deploy to Dev
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Build & Deploy Dev Environment
        run: docker compose -p frontend-dev -f docker-compose.dev.yml up -d --build

  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Build & Deploy Staging Environment
        run: docker compose -p frontend-staging -f docker-compose.staging.yml up -d --build

  deploy-prod:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Build & Deploy Production Environment
        run: docker compose -p frontend-prod -f docker-compose.prod.yml up -d --build
